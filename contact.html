<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - E-Pet Shop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contact-container">
    <div class="container">

        <h2 class="text-center mb-5">Contact Us</h2>

        <div class="row">

            <div class="col-md-6">

                <h4>Get In Touch</h4>

                <p>📧 Email: support@epetshop.com</p>
                <p>📞 Phone: +91 9006476232</p>
                <p>📍 Address: Patna, Bihar, India</p>

            </div>

            <div class="col-md-6">

                <form>

                    <div class="mb-3">
                        <input type="text"
                               class="form-control"
                               placeholder="Your Name">
                    </div>

                    <div class="mb-3">
                        <input type="email"
                               class="form-control"
                               placeholder="Your Email">
                    </div>

                    <div class="mb-3">
                        <textarea class="form-control"
                                  rows="5"
                                  placeholder="Your Message"></textarea>
                    </div>

                    <button type="submit"
                            class="btn btn-primary">
                        Send Message
                    </button>

                </form>

            </div>

        </div>

    </div>
</div>

</body>
</html>
